name: Configure and run workflow

on:
  push:
    branches-ignore:
      - 'chore/**'
  pull_request:

jobs:
  build-deploy:
    uses: ./.github/workflows/workflow.yml
    secrets: inherit
    permissions:
      id-token: write
      contents: write
    with:
      DEPLOY_CLUSTER: dev-gcp
      DEPLOY_NAMESPACE: team-dialog
